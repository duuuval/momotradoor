name: Overnight Market Scanner

on:
  schedule:
    # Runs at 6:30 PM EST (22:30 UTC) Monday-Friday
    - cron: '30 22 * * 1-5'
  workflow_dispatch: # Allows you to click "Run" manually in GitHub UI

jobs:
  scan-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the JSON file back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Scraper Dependencies
        run: npm install cheerio yahoo-finance2

      - name: Run Scanner Engine
        run: node scripts/scanner.mjs

      - name: Commit and Push Signals
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/signals.json
          git commit -m "Automated Market Scan: $(date +'%Y-%m-%d')" || exit 0
          git push
