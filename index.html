<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Momentum Signals</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        
        <div id="warning-banner"></div>

        <header class="mb-10 mt-2">
            <h1 class="text-3xl font-bold tracking-tight">Daily Momentum Signals</h1>
            <p class="text-slate-500 mt-2">S&P 400 & 600 • Volume Spikes • EMA Alignment</p>
            <p id="scan-meta" class="text-xs font-mono text-slate-400 mt-2"></p>
        </header>

        <div id="signals-container" class="grid gap-4">
            </div>
    </div>

    <script>
        async function loadSignals() {
            const container = document.getElementById('signals-container');
            const banner = document.getElementById('warning-banner');
            const meta = document.getElementById('scan-meta');

            try {
                const response = await fetch('/public/signals.json');
                const rawData = await response.json();
                
                // Handle transition between old array format and new object format
                let signals = [];
                let isHostile = false;
                let vixLevel = "Unknown";
                let scanDate = "Unknown";

                if (Array.isArray(rawData)) {
                    signals = rawData;
                } else {
                    signals = rawData.signals || [];
                    isHostile = rawData.isHostile;
                    vixLevel = rawData.vix;
                    scanDate = rawData.date;
                }

                // Update Meta Text
                if (scanDate !== "Unknown") {
                    meta.innerText = `Last Scan: ${scanDate} | VIX: ${vixLevel}`;
                }

                // Render Warning Banner if Hostile
                if (isHostile) {
                    banner.innerHTML = `
                        <div class="bg-red-600 text-white rounded-lg p-5 mb-8 shadow-md border-l-8 border-red-900">
                            <h2 class="font-bold text-xl uppercase tracking-wider mb-1">⚠️ Market Danger Zone</h2>
                            <p class="text-red-100 text-sm">The VIX is currently reading ${vixLevel}. The broader market is hostile and momentum breakout strategies are highly likely to fail. Any signals below should be paper-traded for observation only.</p>
                        </div>
                    `;
                }

                if (signals.length === 0) {
                    container.innerHTML = `
                        <div class="bg-white border border-slate-200 rounded-lg p-8 text-center text-slate-500 shadow-sm">
                            No momentum breakouts detected today. Cash is a position.
                        </div>`;
                    return;
                }

                container.innerHTML = signals.map(signal => `
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white border border-slate-200 rounded-lg p-6 shadow-sm hover:shadow-md transition-shadow">
                        <div class="mb-4 md:mb-0">
                            <h2 class="text-2xl font-bold">${signal.ticker}</h2>
                            <div class="flex gap-2 mt-2">
                                <span class="bg-emerald-100 text-emerald-800 text-xs font-semibold px-2.5 py-0.5 rounded">
                                    Vol Spike: ${signal.volumeSpike}
                                </span>
                                <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded">
                                    Above 20-EMA
                                </span>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-x-8 gap-y-2 text-sm">
                            <div>
                                <p class="text-slate-500">Close Price</p>
                                <p class="font-semibold text-lg">$${signal.price}</p>
                            </div>
                            <div>
                                <p class="text-red-500">Stop Loss (7%)</p>
                                <p class="font-semibold text-lg text-red-600">$${signal.stopLoss}</p>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                container.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-8 text-center text-red-600">
                        Error loading signals. The scanner may not have run yet.
                    </div>`;
            }
        }

        loadSignals();
    </script>
</body>
</html>
