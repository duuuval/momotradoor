<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Momentum Signals</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        
        <div id="warning-banner"></div>

        <header class="mb-10 mt-2 flex flex-col md:flex-row md:items-end justify-between border-b border-slate-200 pb-6">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Daily Momentum Signals</h1>
                <p class="text-slate-500 mt-2">S&P 400 & 600 • Volume Spikes • EMA Alignment</p>
                <p id="vix-meta" class="text-sm font-semibold text-slate-600 mt-2"></p>
            </div>
            <div id="status-badge" class="mt-4 md:mt-0"></div>
        </header>

        <div id="signals-container" class="grid gap-4">
            </div>
    </div>

    <script>
        async function loadSignals() {
            const container = document.getElementById('signals-container');
            const banner = document.getElementById('warning-banner');
            const vixMeta = document.getElementById('vix-meta');
            const statusBadge = document.getElementById('status-badge');

            try {
                const response = await fetch('/public/signals.json');
                const rawData = await response.json();
                
                const signals = rawData.signals || [];
                const isHostile = rawData.isHostile;
                const vixLevel = rawData.vix || "Unknown";
                const timestamp = rawData.timestamp || "Unknown";
                const scanDateOnly = rawData.dateOnly || "";

                // Get today's EST date string to compare
                const todayEst = new Date().toLocaleDateString("en-US", { timeZone: "America/New_York", year: 'numeric', month: 'long', day: 'numeric' });
                
                // Determine Freshness
                if (scanDateOnly === todayEst) {
                    statusBadge.innerHTML = `<span class="bg-emerald-100 text-emerald-800 text-sm font-bold px-3 py-1.5 rounded-md border border-emerald-300 inline-flex items-center gap-1.5"><div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div> TODAY'S RESULTS</span>`;
                } else {
                    statusBadge.innerHTML = `<span class="bg-amber-100 text-amber-800 text-sm font-bold px-3 py-1.5 rounded-md border border-amber-300">🟡 AWAITING TODAY'S SCAN</span>`;
                }

                vixMeta.innerText = `Market VIX: ${vixLevel} | Last Run: ${timestamp}`;

                // Render Warning Banner if Hostile
                if (isHostile) {
                    banner.innerHTML = `
                        <div class="bg-red-600 text-white rounded-lg p-5 mb-8 shadow-md border-l-8 border-red-900">
                            <h2 class="font-bold text-xl uppercase tracking-wider mb-1">⚠️ Market Danger Zone</h2>
                            <p class="text-red-100 text-sm">The VIX is currently reading ${vixLevel}. The broader market is hostile and momentum breakout strategies are highly likely to fail. Any signals below should be paper-traded for observation only.</p>
                        </div>
                    `;
                }

                if (signals.length === 0) {
                    container.innerHTML = `
                        <div class="bg-white border border-slate-200 rounded-lg p-8 text-center text-slate-500 shadow-sm">
                            No momentum breakouts detected today. Cash is a position.
                        </div>`;
                    return;
                }

                container.innerHTML = signals.map(signal => `
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white border border-slate-200 rounded-lg p-6 shadow-sm hover:shadow-md transition-shadow">
                        
                        <div class="mb-4 md:mb-0 w-full md:w-1/3">
                            <a href="https://www.tradingview.com/chart/?symbol=${signal.ticker}" target="_blank" class="inline-flex items-center text-3xl font-black text-slate-900 hover:text-blue-600 transition-colors group">
                                ${signal.ticker}
                                <svg class="w-5 h-5 ml-2 opacity-0 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                            </a>
                            <div class="text-lg font-bold ${signal.dayChange.includes('+') ? 'text-emerald-600' : 'text-red-600'} mt-1">
                                ${signal.dayChange} Today
                            </div>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full md:w-2/3 mt-4 md:mt-0 text-sm">
                            <div class="bg-slate-50 p-3 rounded-md border border-slate-100">
                                <p class="text-slate-500 text-xs font-semibold uppercase mb-1">Price</p>
                                <p class="font-bold text-lg text-slate-900">$${signal.price}</p>
                            </div>
                            
                            <div class="bg-slate-50 p-3 rounded-md border border-slate-100">
                                <p class="text-slate-500 text-xs font-semibold uppercase mb-1">Volume Spike</p>
                                <p class="font-bold text-lg text-slate-900">${signal.volumeSpike}</p>
                                <p class="text-xs text-slate-500 mt-0.5">${signal.rawVolume} / ${signal.avgVolumeStr} avg</p>
                            </div>

                            <div class="bg-slate-50 p-3 rounded-md border border-slate-100">
                                <p class="text-slate-500 text-xs font-semibold uppercase mb-1">20-Day EMA</p>
                                <p class="font-bold text-lg text-slate-900">$${signal.ema20}</p>
                            </div>

                            <div class="bg-red-50 p-3 rounded-md border border-red-100">
                                <p class="text-red-600 text-xs font-semibold uppercase mb-1">Stop Loss</p>
                                <p class="font-bold text-lg text-red-700">$${signal.stopLoss}</p>
                                <p class="text-xs text-red-500 mt-0.5">Risk: $${signal.dollarRisk} / sh</p>
                            </div>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                container.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded-lg p-8 text-center text-red-600">
                        Error loading signals. The scanner may not have run yet.
                    </div>`;
            }
        }

        loadSignals();
    </script>
</body>
</html>
